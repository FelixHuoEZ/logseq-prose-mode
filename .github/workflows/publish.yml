name: Publish Plugin

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release
        run: |
          mkdir -p release
          cp -R dist release/dist
          cp package.json README.md LICENSE icon.svg release/
          cd release
          zip -r ../logseq-prose-mode.zip .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: logseq-prose-mode.zip
          generate_release_notes: true
